# Nginx configuration for cecolivenc.es
# Ubicación en servidor: /etc/nginx/sites-available/cecolivenc

# ── Frontend: cecolivenc.es ──────────────────────────────────
server {
    listen 80;
    server_name cecolivenc.es www.cecolivenc.es;

    root /var/www/cecolivenc/frontend;
    index index.html;

    # Angular: todas las rutas al index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Archivos estáticos con caché
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Backend API: api.cecolivenc.es ───────────────────────────
server {
    listen 80;
    server_name api.cecolivenc.es;

    # Límite de tamaño para uploads (imágenes de competiciones, productos, etc.)
    client_max_body_size 10M;

    # Uploads: servidos directamente por nginx (más eficiente)
    location /uploads/ {
        alias /var/www/cecolivenc/repo/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Todo lo demás: proxy al backend Node.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Webhook de Stripe necesita body sin buffering
        proxy_request_buffering off;
    }
}

# Certbot añadirá aquí automáticamente los bloques HTTPS (443)
