<div class="home-container">
  <!-- Panel de anuncios -->
  <div class="panel-anuncios-wrapper">
    <app-panel-anuncios [anuncios]="anuncios"></app-panel-anuncios>
  </div>

  <!-- Layout de 3 columnas: Redes Sociales | Noticias | Calendario -->
  <section class="three-column-section">
    <div class="section-grid">
      <!-- Columna Izquierda: Redes Sociales -->
      <div class="sidebar-column left-column">
        <div class="sidebar-card">
          <div class="sidebar-header">
            <span class="sidebar-icon">📱</span>
            <h3>Síguenos &#64;c.e.colivenc</h3>
          </div>
          <div class="sidebar-content">
            <app-social-sidebar></app-social-sidebar>
          </div>
        </div>
      </div>

      <!-- Columna Central: Noticias -->
      <div class="main-column">
        <div class="sidebar-card featured-post-card">
          <div class="sidebar-header">
            <span class="sidebar-icon">📌</span>
            <h3>Noticia Destacada</h3>
          </div>
          <div class="sidebar-content">
            <app-featured-post></app-featured-post>
          </div>
        </div>

        <div class="content-card content-card-carousel">
          <div class="card-header">
            <div class="header-title">
              <span class="header-icon">📰</span>
              <h2>Últimas Noticias</h2>
            </div>
            <div class="header-line"></div>
          </div>
          <div class="card-content">
            <app-posts-carousel></app-posts-carousel>
          </div>
        </div>
      </div>

      <!-- Columna Derecha: Calendario -->
      <div class="sidebar-column right-column">
        <div class="sidebar-card">
          <a routerLink="/competiciones" class="sidebar-header sidebar-header-link">
            <span class="sidebar-icon">📅</span>
            <h3>Calendario</h3>
            <i class="fas fa-chevron-right sidebar-header-arrow"></i>
          </a>
          <div class="sidebar-content">
            <app-calendario-lateral></app-calendario-lateral>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Sección de Horarios + Tienda -->
  <section class="schedule-store-section">
    <div class="schedule-store-grid">
      <!-- Columna Horarios -->
      <div class="schedule-column">
        <div class="schedule-header">
          <span class="schedule-icon">⏰</span>
          <h2>Horarios de Entrenamiento</h2>
        </div>
        <app-horarios-escuela></app-horarios-escuela>
      </div>

      <!-- Columna Tienda -->
      <div class="store-column">
        <div class="sidebar-card">
          <a routerLink="/tienda" class="sidebar-header sidebar-header-link sidebar-header-gold">
            <span class="sidebar-icon">🛍️</span>
            <h3>Tienda</h3>
            <i class="fas fa-chevron-right sidebar-header-arrow"></i>
          </a>
          <div class="sidebar-content store-content">
            <app-tienda-preview></app-tienda-preview>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CTA Section -->
  <section class="cta-section">
    <div class="cta-wrapper">
      <div class="cta-card">
        <div class="cta-content">
          <h3>¿Listo para empezar?</h3>
          <p>Únete a nuestra familia de atletas y alcanza tu máximo potencial</p>
        </div>
        <a routerLink="/inscripciones" class="cta-button">
          <span>Inscríbete ahora</span>
          <i class="fas fa-arrow-right"></i>
        </a>
      </div>
    </div>
  </section>
</div>
