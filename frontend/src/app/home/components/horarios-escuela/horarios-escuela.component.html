<div class="horarios-container">
    <div class="horarios-header">
        <h2>Horarios de Entrenamiento</h2>
    </div>

    <div class="horarios-grid">
        <div class="horario-card" *ngFor="let horario of horarios">
            <div class="categoria-header">
                <h3>{{horario.categoria}}</h3>
            </div>
            
            <div class="horario-info">
                <p><strong>Horario:</strong> {{horario.horario}}</p>
            </div>

            <div class="dias-lista">
                <span class="dia-item" *ngFor="let dia of horario.dias">{{dia}}</span>
            </div>
        </div>
    </div>
</div>
