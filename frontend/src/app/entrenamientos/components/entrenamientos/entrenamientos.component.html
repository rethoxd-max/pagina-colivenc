<div class="container">
    <!-- Título y botón -->
    <div class="header">
        <h1>Entrenamientos</h1>
        <button *ngIf="isEntrenador" (click)="navigateToCrearGrupo()" class="btn-new">
            <span>+</span> Nuevo
        </button>
    </div>

    <!-- Lista de grupos -->
    <div *ngIf="gruposEntrenamiento.length; else noData" class="groups-list">
        <div *ngFor="let grupo of gruposEntrenamiento" class="group-item">
            <div class="group-info" (click)="irAlCalendario(grupo._id)">
                <span class="group-name">{{ grupo.nombre_grupo }}</span>
                <span class="group-trainer">{{ grupo.entrenador?.name }}</span>
            </div>
            <div class="group-actions">
                <button *ngIf="puedeEditarGrupo(grupo)" (click)="editarGrupo(grupo._id)" class="btn-edit">
                    <mat-icon>edit</mat-icon>
                </button>
                <span class="view-btn" (click)="irAlCalendario(grupo._id)">→</span>
            </div>
        </div>
    </div>

    <!-- Mensaje sin datos -->
    <ng-template #noData>
        <div class="no-data">
            <p>No estás inscrito en ningún grupo</p>
        </div>
    </ng-template>
</div>
