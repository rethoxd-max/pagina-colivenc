<form [formGroup]="grupoForm" (ngSubmit)="onSubmit()" class="container mt-4 p-4 border rounded shadow">
    <h2 class="mb-4">{{ isEditing ? 'Editar Grupo' : 'Crear Nuevo Grupo' }}</h2>
    
    <div class="mb-3">
        <label for="nombre_grupo" class="form-label">Nombre del Grupo</label>
        <input type="text" id="nombre_grupo" formControlName="nombre_grupo" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="entrenador" class="form-label">Entrenador</label>
        <input id="entrenador" [value]="entrenadorNombre" class="form-control" readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Atletas</label>
        <app-search-atleta (atletaSeleccionado)="addAtleta($event)"></app-search-atleta>
        
        <div class="mt-3">
            <div *ngFor="let atleta of atletasSeleccionados" class="d-flex justify-content-between align-items-center mb-2 p-2 border rounded">
                <span>{{ atleta.nombre }}</span>
                <button type="button" class="btn btn-danger btn-sm" (click)="removeAtleta(atleta._id)">
                    Eliminar
                </button>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-end">
        <button type="button" class="btn btn-secondary me-2" (click)="router.navigate(['/entrenamientos'])">
            Cancelar
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="!grupoForm.valid">
            {{ isEditing ? 'Actualizar' : 'Crear' }}
        </button>
    </div>
</form>
