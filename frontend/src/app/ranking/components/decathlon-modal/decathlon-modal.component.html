<div class="modal-container">
    <div class="modal-header">
        <div class="header-icon">
            <i class="fas fa-medal"></i>
        </div>
        <h2>{{ tipoPrueba }}</h2>
    </div>

    <mat-dialog-content>
        <div class="pruebas-grid">
            <!-- Columna izquierda -->
            <div class="pruebas-columna">
                <div *ngFor="let prueba of pruebas.slice(0, Math.ceil(pruebas.length / 2)); let i = index" class="prueba-item" [class.highlight]="i % 2 === 0">
                    <div class="prueba-info">
                        <span class="prueba-numero">{{ i + 1 }}</span>
                        <span class="prueba-nombre">{{ prueba.nombre }}</span>
                    </div>
                    <div class="prueba-marca">
                        <span class="marca-valor">{{ prueba.marca }}</span>
                        <span *ngIf="prueba.viento" class="marca-viento">({{ prueba.viento > 0 ? '+' : '' }}{{ prueba.viento }})</span>
                    </div>
                </div>
            </div>
            <!-- Columna derecha -->
            <div class="pruebas-columna">
                <div *ngFor="let prueba of pruebas.slice(Math.ceil(pruebas.length / 2)); let i = index" class="prueba-item" [class.highlight]="i % 2 === 0">
                    <div class="prueba-info">
                        <span class="prueba-numero">{{ Math.ceil(pruebas.length / 2) + i + 1 }}</span>
                        <span class="prueba-nombre">{{ prueba.nombre }}</span>
                    </div>
                    <div class="prueba-marca">
                        <span class="marca-valor">{{ prueba.marca }}</span>
                        <span *ngIf="prueba.viento" class="marca-viento">({{ prueba.viento > 0 ? '+' : '' }}{{ prueba.viento }})</span>
                    </div>
                </div>
            </div>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-flat-button color="primary" (click)="onClose()">
            <i class="fas fa-times"></i>
            Cerrar
        </button>
    </mat-dialog-actions>
</div>
