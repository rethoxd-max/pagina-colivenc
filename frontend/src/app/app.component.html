<!-- Navbar principal -->
<nav class="navbar fixed-top">
  <div class="navbar-container">
    <!-- Lado izquierdo: Menú + Logo -->
    <div class="navbar-left">
      <button class="menu-toggle" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
        <span class="menu-icon">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <a routerLink="/home" class="navbar-brand">
        <img src="./assets/logo-colivenc.jpg" alt="Logo Colivenc" class="navbar-logo">
      </a>
    </div>

    <!-- Lado derecho: Botones de acción -->
    <div class="navbar-actions">

      <!-- Filtro de disciplina -->
      <div class="disc-filter">
        <button class="disc-filter-btn" (click)="dropdownAbierto = !dropdownAbierto"
                [class.active]="disciplinaSeleccionada">
          <ng-container *ngIf="getDisciplinaActual() as disc; else iconoGenerico">
            <i class="fas {{ disc.icono }}" [style.color]="disc.color"></i>
          </ng-container>
          <ng-template #iconoGenerico>
            <i class="fas fa-layer-group"></i>
          </ng-template>
          <span class="disc-filter-label">{{ getNombreDisciplina() }}</span>
          <i class="fas fa-chevron-down disc-filter-caret" [class.rotated]="dropdownAbierto"></i>
        </button>
        <div class="disc-dropdown" *ngIf="dropdownAbierto">
          <button class="disc-dropdown-item" [class.selected]="!disciplinaSeleccionada"
                  (click)="seleccionarDisciplina(null)">
            <i class="fas fa-globe"></i> Todas las disciplinas
          </button>
          <button class="disc-dropdown-item" *ngFor="let d of disciplinas"
                  [class.selected]="disciplinaSeleccionada === d._id"
                  (click)="seleccionarDisciplina(d._id)">
            <i class="fas {{ d.icono }}" [style.color]="d.color"></i>
            {{ d.nombre }}
          </button>
        </div>
        <!-- overlay para cerrar al hacer clic fuera -->
        <div class="disc-overlay" *ngIf="dropdownAbierto" (click)="dropdownAbierto = false"></div>
      </div>
      <button *ngIf="isLoggedIn && (atletaId || isAdmin())" class="btn-action" [routerLink]="['/entrenamientos']" title="Entrenamientos">
        <i class="fas fa-running"></i>
        <span class="action-text">Entrenamientos</span>
      </button>
      <button *ngIf="isLoggedIn && atletaSlug" class="btn-action" [routerLink]="['/perfil-atleta', atletaSlug]" title="Mi Perfil">
        <i class="fas fa-user"></i>
        <span class="action-text">Perfil</span>
      </button>
      <button *ngIf="isLoggedIn" class="btn-action" [routerLink]="['/cambiar-password']" title="Cambiar Contraseña">
        <i class="fas fa-key"></i>
        <span class="action-text">Contraseña</span>
      </button>
      <button *ngIf="!isLoggedIn" class="btn-action btn-primary-action" routerLink="/login">
        <i class="fas fa-sign-in-alt"></i>
        <span class="action-text">Iniciar sesión</span>
      </button>
      <button *ngIf="!isLoggedIn" class="btn-action btn-register-action" routerLink="/register">
        <i class="fas fa-user-plus"></i>
        <span class="action-text">Registrarse</span>
      </button>
      <button *ngIf="isLoggedIn" class="btn-action btn-logout" (click)="logout()" title="Cerrar sesión">
        <i class="fas fa-sign-out-alt"></i>
        <span class="action-text">Salir</span>
      </button>
    </div>
  </div>
</nav>

<!-- Menú lateral -->

  <div class="offcanvas-header">
    <a routerLink="/home" class="offcanvas-brand" data-bs-dismiss="offcanvas">
      <img src="./assets/logo-colivenc.jpg" alt="Logo Colivenc" class="sidebar-logo">
    </a>
    <button type="button" class="btn-close-custom" data-bs-dismiss="offcanvas" aria-label="Close">
      <i class="fas fa-times"></i>
    </button>
  </div>
  
  <div class="offcanvas-body">
    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-title">Navegación</span>
        <ul class="nav-list">
          <li class="nav-item">
            <a class="nav-link" routerLink="/home" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-home"></i></div>
              <span>Inicio</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/noticias" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-newspaper"></i></div>
              <span>Noticias</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/competiciones" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-calendar-alt"></i></div>
              <span>Calendario</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/ranking" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-trophy"></i></div>
              <span>Ranking</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/tienda" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-shopping-cart"></i></div>
              <span>Tienda</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/calculadora-combinadas" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-calculator"></i></div>
              <span>Calculadora Combinadas</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
        </ul>
      </div>

      <div class="nav-section" *ngIf="isAdmin()">
        <span class="nav-section-title">Administración</span>
        <ul class="nav-list">
          <li class="nav-item">
            <a class="nav-link admin-link" routerLink="/ranking/create-performance" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-chart-line"></i></div>
              <span>Gestionar Ranking</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-link" routerLink="/datos-competiciones" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-cog"></i></div>
              <span>Gestionar Competiciones</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-link" routerLink="/procesar-resultados" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-file-import"></i></div>
              <span>Procesar Resultados</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-link" routerLink="/admin/usuarios" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-users-cog"></i></div>
              <span>Panel de Usuarios</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-link" routerLink="/admin/disciplinas" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fas fa-layer-group"></i></div>
              <span>Disciplinas</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link admin-link" routerLink="/admin/instagram" routerLinkActive="active" data-bs-dismiss="offcanvas">
              <div class="nav-icon"><i class="fab fa-instagram"></i></div>
              <span>Posts Instagram</span>
              <i class="fas fa-chevron-right nav-arrow"></i>
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
</div>

<router-outlet></router-outlet>

            </a>
        </div>
        <p class="footer-copy">&copy; {{ currentYear }} Centre Esportiu Colivenc.</p>
    </div>
</footer>
