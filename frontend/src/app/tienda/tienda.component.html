<div class="tienda-container">
  <div class="tienda-header">
    <h1>Tienda del Club</h1>
    <div class="tienda-actions">
      <button class="btn-carrito-toggle" (click)="toggleCarrito()">
        <i class="fas fa-shopping-cart"></i>
        <span class="carrito-badge" *ngIf="cantidadItems > 0">{{ cantidadItems }}</span>
      </button>
      <button class="btn-crear-producto" routerLink="/tienda/crear-producto">
        Añadir Nuevo Producto
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">
    Cargando productos...
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div class="productos-grid">
    <div *ngFor="let producto of productos" class="producto-card">
      <div class="producto-imagen-container" (click)="seleccionarProducto(producto)">
        <img [src]="getImagenUrl(producto.imagen)" [alt]="producto.nombre" class="producto-imagen">
      </div>
      <div class="producto-info">
        <h2>{{ producto.nombre }}</h2>
        <p>{{ producto.descripcion }}</p>
        <p class="precio">{{ producto.precio | currency:'EUR' }}</p>
        
        <div class="tallas-container" (click)="$event.stopPropagation()">
          <select 
            [ngModel]="getTallaSeleccionada(producto._id)"
            (ngModelChange)="seleccionarTalla(producto._id, $event)"
            class="talla-select">
            <option value="">Selecciona talla</option>
            <option *ngFor="let talla of producto.tallas" [value]="talla">
              {{ formatearTalla(talla) }}
            </option>
          </select>
        </div>

        <div class="acciones-producto">
          <button 
            class="btn-carrito" 
            (click)="agregarAlCarrito(producto); $event.stopPropagation()" 
            [disabled]="!getTallaSeleccionada(producto._id)">
            Añadir al carrito
          </button>
          <button 
            class="btn-editar" 
            (click)="editarProducto(producto); $event.stopPropagation()">
            Editar
          </button>
          <button 
            class="btn-eliminar" 
            (click)="eliminarProducto(producto); $event.stopPropagation()">
            Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="productoSeleccionado" class="modal">
    <div class="modal-content">
      <h2>{{ productoSeleccionado.nombre }}</h2>
      <img [src]="getImagenUrl(productoSeleccionado.imagen)" [alt]="productoSeleccionado.nombre" class="producto-imagen-detalle">
      <p>{{ productoSeleccionado.descripcion }}</p>
      <p class="precio">{{ productoSeleccionado.precio | currency:'EUR' }}</p>
      
      <div class="tallas-container">
        <h3>Selecciona tu talla:</h3>
        <div class="tallas-grid">
          <button 
            *ngFor="let talla of productoSeleccionado.tallas" 
            [class.selected]="talla === getTallaSeleccionada(productoSeleccionado._id)"
            (click)="seleccionarTalla(productoSeleccionado._id, talla)">
            {{ formatearTalla(talla) }}
          </button>
        </div>
      </div>

      <div class="acciones">
        <button 
          class="btn-carrito" 
          (click)="agregarAlCarrito(productoSeleccionado)" 
          [disabled]="!getTallaSeleccionada(productoSeleccionado._id)">
          Añadir al carrito
        </button>
        <button class="btn-cerrar" (click)="productoSeleccionado = null">
          Cerrar
        </button>
      </div>
    </div>
  </div>

  <app-carrito #carritoComponent></app-carrito>
</div>
