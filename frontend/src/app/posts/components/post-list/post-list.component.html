<div class="posts-page">
    <!-- Header de la página -->
    <div class="page-header">
        <div class="header-content">
            <span class="header-badge">
                <i class="fas fa-newspaper"></i>
                Actualidad
            </span>
            <h1 class="page-title">Boletín Semanal</h1>
            <p class="page-subtitle">Las últimas noticias y eventos de nuestro club</p>
        </div>
    </div>

    <!-- Contenido principal -->
    <div class="posts-container">
        <!-- Botón crear noticia -->
        <div *ngIf="(isAdmin() || isEditor())" class="action-bar">
            <button class="btn-create" [routerLink]="['/create']">
                <i class="fas fa-plus"></i>
                Crear nueva noticia
            </button>
        </div>

        <!-- Grid de noticias -->
        <div *ngIf="posts.length > 0" class="posts-grid">
            <article *ngFor="let post of posts; let i = index" 
                     class="post-card" 
                     [style.--delay]="i * 0.1 + 's'"
                     (click)="verNoticia(post._id)">
                
                <!-- Imagen de la noticia -->
                <div class="post-image-wrapper">
                    <img *ngIf="post.imageUrl" 
                         [src]="getImageUrl(post.imageUrl)" 
                         [alt]="post.title"
                         class="post-image">
                    <div *ngIf="!post.imageUrl" class="post-image-placeholder">
                        <i class="fas fa-image"></i>
                    </div>
                    <div class="post-category">
                        <i class="fas fa-tag"></i>
                        Noticia
                    </div>
                </div>

                <!-- Contenido de la noticia -->
                <div class="post-content">
                    <div class="post-meta">
                        <span class="post-date">
                            <i class="far fa-calendar-alt"></i>
                            {{ post.createdAt | date:'dd MMM yyyy' }}
                        </span>
                    </div>
                    
                    <h3 class="post-title">{{ post.title }}</h3>
                    <p class="post-excerpt">{{ post.content | slice:0:120 }}...</p>
                    
                    <div class="post-footer">
                        <span class="read-more">
                            Leer más
                            <i class="fas fa-arrow-right"></i>
                        </span>
                        
                        <div *ngIf="(isAdmin() || isEditor())" class="post-actions">
                            <button (click)="editarNoticia($event, post._id)" 
                                    class="btn-action btn-edit"
                                    title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button (click)="eliminarNoticia($event, post._id)" 
                                    class="btn-action btn-delete"
                                    title="Eliminar">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        </div>

        <!-- Estado vacío -->
        <div *ngIf="posts.length === 0" class="empty-state">
            <div class="empty-icon">
                <i class="fas fa-newspaper"></i>
            </div>
            <h3>No hay noticias disponibles</h3>
            <p>Vuelve pronto para ver las últimas actualizaciones</p>
        </div>
    </div>
</div>
