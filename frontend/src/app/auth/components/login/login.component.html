<div class="login-container d-flex align-items-center justify-content-center">
    <div class="login-box p-4 rounded shadow-lg">
        <h2 class="text-center mb-4">Iniciar Sesión</h2>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <!-- Email -->
            <div class="form-group mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" id="email" [(ngModel)]="user.email" name="email" placeholder="Introduce tu email"
                    class="form-control" required email #email="ngModel" />
                <div *ngIf="email.invalid && email.touched" class="text-danger">
                    <div *ngIf="email.errors?.['required']">El correo es obligatorio</div>
                    <div *ngIf="email.errors?.['email']">El formato del correo no es válido</div>
                </div>
            </div>

            <!-- Contraseña -->
            <div class="form-group mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" [(ngModel)]="user.password" name="password"
                    placeholder="Introduce tu contraseña" class="form-control" required #password="ngModel" />
                <div *ngIf="password.invalid && password.touched" class="text-danger">
                    <div *ngIf="password.errors?.['required']">La contraseña es obligatoria</div>
                </div>
            </div>

            <!-- Botón de Login -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">Iniciar
                    Sesión</button>
            </div>

            <!-- Mostrar error del backend -->
            <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
        </form>

        <!-- Opción de Registro -->
        <div class="text-center mt-3">
            <a routerLink="/register" class="text-muted">¿No tienes cuenta? Regístrate aquí</a>
        </div>
    </div>
</div>
