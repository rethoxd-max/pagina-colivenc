<div class="auth-page">
  <div class="auth-card">

    <!-- Panel izquierdo: branding -->
    <div class="auth-brand">
      <img src="./assets/logo-colivenc.jpg" alt="Logo Colivenc" class="brand-logo">
      <h1 class="brand-title">Centre Esportiu Colivenc</h1>
    </div>

    <!-- Panel derecho: formulario -->
    <div class="auth-form-panel">
      <div class="auth-form-inner">

        <h2 class="form-title">Bienvenido</h2>
        <p class="form-subtitle">Inicia sesión para acceder a tu cuenta</p>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" autocomplete="off">

          <div class="field-group">
            <label class="field-label">Correo electrónico</label>
            <div class="input-icon-wrap">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" [(ngModel)]="user.email" name="email"
                class="field-input" placeholder="correo@ejemplo.com"
                required email #email="ngModel" />
            </div>
            <span *ngIf="email.invalid && email.touched" class="field-error">
              <span *ngIf="email.errors?.['required']">El correo es obligatorio</span>
              <span *ngIf="email.errors?.['email']">Formato de correo no válido</span>
            </span>
          </div>

          <div class="field-group">
            <label class="field-label">Contraseña</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" [(ngModel)]="user.password" name="password"
                class="field-input" placeholder="Tu contraseña"
                required #password="ngModel" />
            </div>
            <span *ngIf="password.invalid && password.touched" class="field-error">
              La contraseña es obligatoria
            </span>
          </div>

          <div *ngIf="errorMessage" class="form-alert">
            <i class="fas fa-exclamation-circle me-2"></i>{{ errorMessage }}
          </div>

          <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">
            Iniciar sesión
          </button>

        </form>

        <div class="form-links">
          <a routerLink="/register">¿Aún no tienes cuenta? <strong>Regístrate</strong></a>
        </div>

        <app-solicitud-cuenta></app-solicitud-cuenta>

      </div>
    </div>

  </div>
</div>
