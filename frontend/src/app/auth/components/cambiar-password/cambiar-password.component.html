<div class="container mt-3 mt-md-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Cambiar Contraseña</h3>
                </div>
                <div class="card-body">
                    <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
                        <!-- Contraseña actual -->
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">Contraseña Actual</label>
                            <div class="input-group">
                                <input [type]="showCurrentPassword ? 'text' : 'password'" 
                                       class="form-control" 
                                       id="currentPassword" 
                                       formControlName="currentPassword"
                                       [class.is-invalid]="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched">
                                <button class="btn btn-outline-secondary" 
                                        type="button"
                                        (click)="togglePasswordVisibility('currentPassword')">
                                    <i class="fas" [class.fa-eye]="!showCurrentPassword" [class.fa-eye-slash]="showCurrentPassword"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" *ngIf="passwordForm.get('currentPassword')?.errors?.['required']">
                                La contraseña actual es requerida
                            </div>
                        </div>

                        <!-- Nueva contraseña -->
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Nueva Contraseña</label>
                            <div class="input-group">
                                <input [type]="showNewPassword ? 'text' : 'password'" 
                                       class="form-control" 
                                       id="newPassword" 
                                       formControlName="newPassword"
                                       [class.is-invalid]="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched">
                                <button class="btn btn-outline-secondary" 
                                        type="button"
                                        (click)="togglePasswordVisibility('newPassword')">
                                    <i class="fas" [class.fa-eye]="!showNewPassword" [class.fa-eye-slash]="showNewPassword"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" *ngIf="passwordForm.get('newPassword')?.errors?.['required']">
                                La nueva contraseña es requerida
                            </div>
                            <div class="invalid-feedback" *ngIf="passwordForm.get('newPassword')?.errors?.['minlength']">
                                La contraseña debe tener al menos 6 caracteres
                            </div>
                        </div>

                        <!-- Confirmar nueva contraseña -->
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirmar Nueva Contraseña</label>
                            <div class="input-group">
                                <input [type]="showConfirmPassword ? 'text' : 'password'" 
                                       class="form-control" 
                                       id="confirmPassword" 
                                       formControlName="confirmPassword"
                                       [class.is-invalid]="passwordForm.get('confirmPassword')?.errors?.['passwordMismatch'] && passwordForm.get('confirmPassword')?.touched">
                                <button class="btn btn-outline-secondary" 
                                        type="button"
                                        (click)="togglePasswordVisibility('confirmPassword')">
                                    <i class="fas" [class.fa-eye]="!showConfirmPassword" [class.fa-eye-slash]="showConfirmPassword"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" *ngIf="passwordForm.get('confirmPassword')?.errors?.['required']">
                                Por favor confirma la nueva contraseña
                            </div>
                            <div class="invalid-feedback" *ngIf="passwordForm.get('confirmPassword')?.errors?.['passwordMismatch']">
                                Las contraseñas no coinciden
                            </div>
                        </div>

                        <!-- Mensajes de error y éxito -->
                        <div class="alert alert-danger" *ngIf="errorMessage">
                            {{ errorMessage }}
                        </div>
                        <div class="alert alert-success" *ngIf="successMessage">
                            {{ successMessage }}
                        </div>

                        <!-- Botón de envío -->
                        <div class="d-grid gap-2">
                            <button type="submit" 
                                    class="btn btn-primary" 
                                    [disabled]="passwordForm.invalid">
                                Cambiar Contraseña
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
